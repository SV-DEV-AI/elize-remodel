<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elize | Python Expert Assistant</title>
    <meta name="description" content="A premium AI coding assistant focused on Python.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <main class="chat-container">
        <header class="chat-header">
            <div class="header-info">
                <div class="avatar">
                    <span class="avatar-icon">🐍</span>
                    <div class="status-indicator"></div>
                </div>
                <div>
                    <h1>Elize AI</h1>
                    <p>Python Expert Assistant</p>
                </div>
            </div>
            <button class="menu-btn" id="clearBtn" title="Clear Chat">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
            </button>
        </header>

        <div class="chat-messages" id="chatMessages">
            <!-- Messages will be injected here -->
            <div class="message ai-message fade-in">
                <div class="message-content">
                    Hello! 👋 I am Elize, your premium AI assistant specialized exclusively in <strong>Python programming</strong>. How can I help you code today?
                </div>
            </div>
        </div>

        <div class="chat-input-container">
            <form id="chatForm" class="chat-form">
                <input type="text" id="userInput" placeholder="Ask anything about Python..." autocomplete="off" required>
                <button type="submit" class="send-btn" id="sendBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </form>
        </div>
    </main>

    <!-- Custom JS -->
    <script src="script.js"></script>
</body>
</html>
